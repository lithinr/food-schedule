<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="Food Schedule">
    <title>Family Food Schedule</title>
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="icon-192.png">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div id="app">
        <!-- Navigation -->
        <nav class="nav-bar">
            <button class="nav-btn active" data-view="daily">Today</button>
            <button class="nav-btn" data-view="weekly">Week</button>
            <button class="nav-btn" data-view="food-items">Foods</button>
            <button class="nav-btn" data-view="shopping">Shopping</button>
        </nav>

        <!-- Daily Menu View -->
        <div id="daily-view" class="view active">
            <div class="view-header">
                <h1>Today's Menu</h1>
                <p class="date-display"></p>
            </div>
            <div id="daily-menu" class="menu-container">
                <!-- Daily menu items will be inserted here -->
            </div>
            <button class="btn-primary" id="regenerate-btn">Regenerate Menu</button>
        </div>

        <!-- Weekly Menu View -->
        <div id="weekly-view" class="view">
            <div class="view-header">
                <h1>This Week</h1>
                <div class="week-navigation">
                    <button id="prev-week" class="btn-icon">&larr;</button>
                    <span id="week-range"></span>
                    <button id="next-week" class="btn-icon">&rarr;</button>
                </div>
            </div>
            <button class="btn-primary" id="edit-week-btn">Edit Menu</button>
            <button class="btn-primary hidden" id="save-week-btn">Save Menu</button>
            <div id="weekly-menu" class="week-container">
                <!-- Weekly menu will be inserted here -->
            </div>
        </div>

        <!-- Food Items Management View -->
        <div id="food-items-view" class="view">
            <div class="view-header">
                <h1>Food Items</h1>
                <button class="btn-primary" id="add-food-btn">+ Add Food</button>
            </div>
            
            <!-- Add/Edit Food Form (hidden by default) -->
            <div id="food-form" class="food-form hidden">
                <h2 id="form-title">Add Food Item</h2>
                <form id="food-item-form">
                    <input type="hidden" id="food-id">
                    
                    <label for="food-name">Food Name</label>
                    <input type="text" id="food-name" required placeholder="e.g., Idli">
                    
                    <label for="food-category">Category</label>
                    <select id="food-category" required>
                        <option value="breakfast">Breakfast</option>
                        <option value="lunch">Lunch</option>
                        <option value="morningSnack">Morning Snack</option>
                        <option value="eveningSnack">Evening Snack</option>
                    </select>
                    
                    <label for="food-ingredients">Ingredients (one per line)</label>
                    <textarea id="food-ingredients" rows="5" placeholder="Rice&#10;Urad dal&#10;Salt"></textarea>
                    
                    <div class="form-buttons">
                        <button type="submit" class="btn-primary">Save</button>
                        <button type="button" class="btn-secondary" id="cancel-food-btn">Cancel</button>
                    </div>
                </form>
            </div>

            <!-- Food Items List -->
            <div id="food-items-list">
                <div class="category-section">
                    <h2>Breakfast</h2>
                    <div id="breakfast-items" class="food-grid"></div>
                </div>
                <div class="category-section">
                    <h2>Lunch</h2>
                    <div id="lunch-items" class="food-grid"></div>
                </div>
                <div class="category-section">
                    <h2>Morning Snacks</h2>
                    <div id="morningSnack-items" class="food-grid"></div>
                </div>
                <div class="category-section">
                    <h2>Evening Snacks</h2>
                    <div id="eveningSnack-items" class="food-grid"></div>
                </div>
            </div>
        </div>

        <!-- Shopping List View -->
        <div id="shopping-view" class="view">
            <div class="view-header">
                <h1>Shopping List</h1>
                <button class="btn-primary" id="refresh-shopping-btn">Refresh</button>
            </div>
            <div id="shopping-list" class="shopping-list">
                <!-- Shopping list will be inserted here -->
            </div>
        </div>

        <!-- Settings Overlay -->
        <div id="settings-overlay" class="overlay hidden">
            <div class="overlay-content">
                <h2>Supabase Settings</h2>
                <p>Configure Supabase access for cloud sync</p>
                
                <label for="supabase-url">Project URL</label>
                <input type="text" id="supabase-url" placeholder="https://your-project.supabase.co">
                
                <label for="supabase-anon-key">Anon Key</label>
                <input type="password" id="supabase-anon-key" placeholder="eyJ...">
                
                <div class="form-buttons">
                    <button class="btn-secondary" id="test-connection-btn">Test Connection</button>
                    <button class="btn-primary" id="save-settings-btn">Save</button>
                    <button class="btn-secondary" id="close-settings-btn">Close</button>
                </div>
            </div>
        </div>

        <!-- Sync Status Bar -->
        <div id="sync-status-bar" class="sync-status-bar hidden">
            <span id="sync-status-text">Syncing...</span>
        </div>

        <!-- Action Buttons (Floating) -->
        <button class="sync-btn" id="sync-btn" title="Sync with cloud">🔄</button>
        <button class="settings-btn" id="open-settings-btn" title="Settings">⚙️</button>
        
        <!-- Last Sync Display -->
        <div class="last-sync-display" id="last-sync-display">
            <span id="last-sync-text">Never synced</span>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
    <script src="js/config.js"></script>
    <script src="js/supabaseApi.js"></script>
    <script src="js/storage.js"></script>
    <script src="js/menuAlgorithm.js"></script>
    <script src="js/foodManager.js"></script>
    <script src="js/dailyMenu.js"></script>
    <script src="js/weeklyMenu.js"></script>
    <script src="js/shoppingList.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
